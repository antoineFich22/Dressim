<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dressim — Virtual Try-On</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --border-hover: #444;
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.15);
      --text: #f0ece4;
      --text-muted: #888;
      --radius: 2px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    /* ── Layout ── */
    .shell { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300; letter-spacing: .12em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .mode-badge {
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-muted); border: 1px solid var(--border);
      padding: .25rem .6rem; border-radius: 20px;
    }
    .mode-badge.live { color: var(--accent); border-color: var(--accent); }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      max-width: 1200px;
      margin: 2.5rem auto;
      width: calc(100% - 3rem);
      border: 1px solid var(--border);
    }

    .panel {
      background: var(--surface);
      padding: 2rem;
      display: flex; flex-direction: column; gap: 1.2rem;
    }

    .panel-label {
      font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 300; color: var(--text);
    }

    /* ── Drop zone ── */
    .dropzone {
      flex: 1;
      border: 1px dashed var(--border-hover);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .8rem;
      min-height: 280px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative; overflow: hidden;
    }
    .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-dim); }

    .dropzone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    .dropzone-icon {
      width: 36px; height: 36px;
      border: 1px solid var(--border-hover);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .dropzone-hint {
      font-size: .72rem; color: var(--text-muted); text-align: center;
      letter-spacing: .04em; line-height: 1.5;
    }

    .dropzone img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .dropzone .remove-btn {
      position: absolute; top: .5rem; right: .5rem;
      background: rgba(0,0,0,.7); border: none; color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; font-size: .8rem; display: none;
      align-items: center; justify-content: center;
    }
    .dropzone.has-image .remove-btn { display: flex; }
    .dropzone.has-image .dropzone-icon,
    .dropzone.has-image .dropzone-hint { display: none; }

    /* ── Result panel ── */
    #result-panel { position: relative; }

    .result-placeholder {
      flex: 1; min-height: 280px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .8rem;
    }

    .result-placeholder p {
      font-size: .72rem; color: var(--text-muted);
      letter-spacing: .04em; text-align: center; line-height: 1.6;
    }

    .result-image-wrap {
      flex: 1; min-height: 280px;
      display: none;
      position: relative;
    }
    .result-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: var(--radius);
    }
    .result-image-wrap.visible { display: block; }

    .download-btn {
      position: absolute; bottom: .75rem; right: .75rem;
      background: rgba(0,0,0,.7); border: 1px solid var(--border-hover);
      color: var(--text); padding: .4rem .8rem;
      font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; border-radius: var(--radius);
      text-decoration: none;
      transition: border-color .2s;
    }
    .download-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Spinner ── */
    .spinner-wrap {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: var(--surface);
      border-radius: var(--radius);
    }
    .spinner-wrap.active { display: flex; }

    .spinner {
      width: 32px; height: 32px;
      border: 1.5px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-status {
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── CTA ── */
    .cta-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: .85rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background .2s, color .2s;
      width: 100%;
    }
    .cta-btn:hover:not(:disabled) { background: var(--accent); color: #000; }
    .cta-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Error toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1a0a0a; border: 1px solid #a33;
      color: #e88; padding: .7rem 1.4rem;
      font-size: .72rem; border-radius: var(--radius);
      display: none; z-index: 99;
    }
    .toast.show { display: block; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2.5rem;
      font-size: .65rem; color: var(--text-muted);
      letter-spacing: .06em;
      display: flex; justify-content: space-between;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; margin: 1rem; width: auto; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">dress<span>im</span></div>
    <span class="mode-badge" id="mode-badge">Chargement…</span>
  </header>

  <main>
    <!-- Panel 1 : Photo personne -->
    <div class="panel">
      <div class="panel-label">Étape 01</div>
      <div class="panel-title">Votre photo</div>
      <div class="dropzone" id="dz-model">
        <input type="file" id="file-model" accept="image/*" />
        <div class="dropzone-icon">+</div>
        <div class="dropzone-hint">Glissez ou cliquez<br/>JPG / PNG · max 10 Mo</div>
        <img id="preview-model" src="" alt="" />
        <button class="remove-btn" id="rm-model" title="Retirer">✕</button>
      </div>
    </div>

    <!-- Panel 2 : Vêtement -->
    <div class="panel">
      <div class="panel-label">Étape 02</div>
      <div class="panel-title">Le vêtement</div>
      <div class="dropzone" id="dz-garment">
        <input type="file" id="file-garment" accept="image/*" />
        <div class="dropzone-icon">+</div>
        <div class="dropzone-hint">Glissez ou cliquez<br/>JPG / PNG · max 10 Mo</div>
        <img id="preview-garment" src="" alt="" />
        <button class="remove-btn" id="rm-garment" title="Retirer">✕</button>
      </div>
      <button class="cta-btn" id="submit-btn" disabled>Générer l'essayage →</button>
    </div>

    <!-- Panel 3 : Résultat -->
    <div class="panel" id="result-panel">
      <div class="panel-label">Résultat</div>
      <div class="panel-title">Essayage virtuel</div>

      <div class="result-placeholder" id="result-placeholder">
        <p>Le résultat<br/>apparaîtra ici</p>
      </div>

      <div class="result-image-wrap" id="result-wrap">
        <img id="result-img" src="" alt="Résultat essayage" />
        <a class="download-btn" id="download-btn" download="dressim-result.jpg" target="_blank">
          Télécharger
        </a>
      </div>

      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
        <span class="spinner-status" id="spinner-status">Démarrage…</span>
      </div>
    </div>
  </main>

  <footer>
    <span>Dressim — powered by Fashn.ai</span>
    <span id="footer-mode"></span>
  </footer>

</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = { model: null, garment: null, polling: null };

// ── DOM refs ──────────────────────────────────────────────────────────────────
const fileModel    = document.getElementById('file-model');
const fileGarment  = document.getElementById('file-garment');
const dzModel      = document.getElementById('dz-model');
const dzGarment    = document.getElementById('dz-garment');
const previewModel = document.getElementById('preview-model');
const previewGarment = document.getElementById('preview-garment');
const rmModel      = document.getElementById('rm-model');
const rmGarment    = document.getElementById('rm-garment');
const submitBtn    = document.getElementById('submit-btn');
const spinner      = document.getElementById('spinner');
const spinnerStatus = document.getElementById('spinner-status');
const resultPlaceholder = document.getElementById('result-placeholder');
const resultWrap   = document.getElementById('result-wrap');
const resultImg    = document.getElementById('result-img');
const downloadBtn  = document.getElementById('download-btn');
const toast        = document.getElementById('toast');
const modeBadge    = document.getElementById('mode-badge');
const footerMode   = document.getElementById('footer-mode');

// ── Mode detection ─────────────────────────────────────────────────────────────
fetch('/api/mode').then(r => r.json()).then(({ mock }) => {
  if (mock) {
    modeBadge.textContent = 'Mode démo';
    footerMode.textContent = 'Mode démo — résultats simulés';
  } else {
    modeBadge.textContent = 'Live';
    modeBadge.classList.add('live');
    footerMode.textContent = 'Connecté à Fashn.ai';
  }
});

// ── File handling ─────────────────────────────────────────────────────────────
function setupDropzone(dz, input, preview, removeBtn, stateKey) {
  input.addEventListener('change', e => loadFile(e.target.files[0], preview, dz, stateKey));

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file, preview, dz, stateKey);
  });

  removeBtn.addEventListener('click', e => {
    e.stopPropagation();
    state[stateKey] = null;
    preview.src = '';
    dz.classList.remove('has-image');
    input.value = '';
    updateSubmit();
  });
}

function loadFile(file, preview, dz, stateKey) {
  if (!file || !file.type.startsWith('image/')) return showToast('Format non supporté.');
  state[stateKey] = file;
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; dz.classList.add('has-image'); };
  reader.readAsDataURL(file);
  updateSubmit();
}

setupDropzone(dzModel,   fileModel,   previewModel,   rmModel,   'model');
setupDropzone(dzGarment, fileGarment, previewGarment, rmGarment, 'garment');

function updateSubmit() {
  submitBtn.disabled = !(state.model && state.garment);
}

// ── Submit ─────────────────────────────────────────────────────────────────────
submitBtn.addEventListener('click', async () => {
  if (!state.model || !state.garment) return;

  setLoading(true, 'Envoi des images…');
  resetResult();

  const form = new FormData();
  form.append('model_image', state.model);
  form.append('garment_image', state.garment);

  try {
    const res = await fetch('/api/tryon', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');

    pollStatus(data.id);
  } catch (err) {
    setLoading(false);
    showToast(err.message);
  }
});

// ── Polling ───────────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  starting: 'Démarrage…',
  in_queue: 'En file d\'attente…',
  processing: 'Génération en cours…',
  completed: 'Terminé !',
  failed: 'Échec',
};

function pollStatus(id) {
  let attempts = 0;
  state.polling = setInterval(async () => {
    attempts++;
    if (attempts > 60) { // max 2 min
      clearInterval(state.polling);
      setLoading(false);
      showToast('Délai dépassé. Réessayez.');
      return;
    }

    try {
      const res = await fetch(`/api/status/${id}`);
      const data = await res.json();

      spinnerStatus.textContent = STATUS_LABELS[data.status] || data.status;

      if (data.status === 'completed') {
        clearInterval(state.polling);
        setLoading(false);
        showResult(data.output[0]);
      } else if (data.status === 'failed') {
        clearInterval(state.polling);
        setLoading(false);
        showToast(data.error?.message || 'La génération a échoué.');
      }
    } catch {
      // transient network error — keep polling
    }
  }, 1000);
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function setLoading(on, label = '') {
  spinner.classList.toggle('active', on);
  spinnerStatus.textContent = label;
  submitBtn.disabled = on;
  if (!on) updateSubmit();
}

function resetResult() {
  resultPlaceholder.style.display = 'flex';
  resultWrap.classList.remove('visible');
  resultImg.src = '';
  downloadBtn.href = '';
}

function showResult(url) {
  resultPlaceholder.style.display = 'none';
  resultImg.src = url;
  downloadBtn.href = url;
  resultWrap.classList.add('visible');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}
</script>
</body>
</html>
